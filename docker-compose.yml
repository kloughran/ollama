services:
  ollama:
    build: .
    container_name: ollama
    environment:
      - ANTHROPIC_BASE_URL=http://localhost:11434
      - ANTHROPIC_AUTH_TOKEN=ollama
      - CLAUDE_CODE_MODEL=llama3.2
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - /media/container-storage/ollama:/root/.ollama
